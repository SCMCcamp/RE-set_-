<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RE:Set · 留言墙</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  /* Palette — warm ivory × deep forest × aged gold */
  --forest:#2d4a27;--forest-mid:#3d6135;--forest-lt:#5a8a50;--forest-glow:rgba(45,74,39,0.2);
  --gold:#b8913a;--gold-lt:#f0e0b0;--gold-mid:#d4b870;--gold-faint:#f7f0e0;
  --ivory:#faf7f0;--ivory-dark:#f0e8d4;--parch:#e6d9c0;--linen:#f5efe3;
  --mahog:#3a2510;--mahog-mid:#5c3d20;--mahog-lt:#8a6040;--mahog-faint:#c0a080;
  --ink:#1a150d;--ink-mid:#2e2518;--ink-lt:#4a3c28;
  --white:#ffffff;--ruby:#8b1a2a;--ruby-lt:#fdf0f2;

  --sh-xs:0 1px 4px rgba(58,37,16,0.07);
  --sh-sm:0 2px 12px rgba(58,37,16,0.09);
  --sh-md:0 6px 28px rgba(58,37,16,0.12);
  --sh-lg:0 16px 52px rgba(58,37,16,0.15);

  --r-sm:10px;--r-md:16px;--r-lg:22px;--r-xl:30px;--r-pill:999px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --ease:0.2s cubic-bezier(0.4,0,0.2,1);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body {
  font-family:'Noto Sans SC',sans-serif;
  font-weight:300;
  background:var(--ivory);
  min-height:100vh;
  color:var(--ink);
  overflow-x:hidden;
}

/* Subtle woven texture background */
body::before {
  content:'';
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 55% at 10% 8%, rgba(184,145,58,0.06) 0%,transparent 55%),
    radial-gradient(ellipse 55% 65% at 90% 92%, rgba(45,74,39,0.08) 0%,transparent 50%),
    url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='19' y='19' width='2' height='2' rx='1' fill='%23c0a080' fill-opacity='0.22'/%3E%3C/svg%3E");
  background-size:auto,auto,40px 40px;
}

.app {
  position:relative;z-index:1;
  max-width:980px;margin:0 auto;
  padding:20px 16px calc(28px + var(--safe-b));
}

/* ─── HEADER ─── */
.header-card {
  background:var(--forest);
  border-radius:var(--r-xl);
  padding:20px 28px;
  margin-bottom:18px;
  box-shadow:var(--sh-md), inset 0 1px 0 rgba(255,255,255,0.08);
  display:flex;justify-content:space-between;align-items:center;
  position:relative;overflow:hidden;
}
.header-card::after {
  content:'';
  position:absolute;
  top:-60px;right:-40px;
  width:220px;height:220px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(184,145,58,0.12) 0%, transparent 70%);
  pointer-events:none;
}
.header-card::before {
  content:'';
  position:absolute;
  bottom:-30px;left:60px;
  width:140px;height:140px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
  pointer-events:none;
}

.logo-area {display:flex;align-items:center;gap:16px;}
.logo-icon-wrap {
  width:52px;height:52px;
  background:rgba(255,255,255,0.1);
  border-radius:var(--r-md);
  border:1px solid rgba(184,145,58,0.35);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.logo-text h1 {
  font-family:'Playfair Display',serif;
  color:white;
  font-size:1.45rem;
  font-weight:700;
  letter-spacing:-0.01em;
}
.logo-text p {
  color:rgba(255,255,255,0.5);
  font-size:0.67rem;
  margin-top:3px;
  letter-spacing:0.08em;
  font-weight:400;
}
.gold-rule {
  width:36px;height:1px;
  background:linear-gradient(90deg, var(--gold-mid), transparent);
  margin-top:5px;
}

/* User badge */
.user-menu{position:relative;}
.user-badge {
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(184,145,58,0.4);
  padding:9px 18px;
  border-radius:var(--r-pill);
  font-size:0.82rem;
  color:rgba(255,255,255,0.9);
  font-weight:400;
  display:flex;align-items:center;gap:9px;
  cursor:pointer;
  max-width:190px;
  transition:background var(--ease),border-color var(--ease);
}
.user-badge:hover{background:rgba(255,255,255,0.18);border-color:rgba(184,145,58,0.7);}

.user-dropdown {
  position:absolute;top:50px;right:0;
  background:var(--white);
  border-radius:var(--r-lg);
  box-shadow:var(--sh-lg);
  min-width:200px;
  z-index:300;
  overflow:hidden;
  display:none;
  border:1px solid var(--parch);
}
.user-dropdown.show{display:block;animation:dropFade 0.14s ease;}
@keyframes dropFade{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

.dropdown-item {
  padding:13px 18px;
  font-size:0.84rem;
  cursor:pointer;
  border-bottom:1px solid var(--ivory-dark);
  display:flex;align-items:center;gap:10px;
  color:var(--ink-mid);
  transition:background var(--ease),color var(--ease);
}
.dropdown-item:last-child{border-bottom:none;}
.dropdown-item:hover{background:var(--linen);color:var(--forest);}

/* ─── NICKNAME CARD ─── */
.nickname-card {
  background:var(--white);
  border-radius:var(--r-lg);
  padding:18px 22px;
  margin-bottom:18px;
  box-shadow:var(--sh-sm);
  border:1px solid var(--ivory-dark);
}
.nickname-group{display:flex;gap:10px;align-items:center;}
.nickname-group input {
  flex:1;min-width:0;
  padding:11px 20px;
  border:1.5px solid var(--parch);
  border-radius:var(--r-pill);
  font-size:0.9rem;font-family:inherit;font-weight:400;
  background:var(--linen);color:var(--ink);
  transition:border-color var(--ease),background var(--ease);
}
.nickname-group input:focus{outline:none;border-color:var(--forest);background:white;}
.nickname-group input:disabled{background:var(--ivory-dark);color:var(--mahog-lt);}
.nickname-group input::placeholder{color:var(--mahog-faint);}

.btn-primary {
  background:var(--forest);
  padding:11px 24px;
  border:none;border-radius:var(--r-pill);
  color:white;
  font-weight:500;font-size:0.87rem;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  font-family:inherit;
  box-shadow:0 3px 10px var(--forest-glow);
  transition:transform var(--ease),box-shadow var(--ease),background var(--ease);
  display:flex;align-items:center;gap:8px;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 5px 18px var(--forest-glow);background:var(--forest-mid);}
.btn-primary:active{transform:translateY(0);}
.btn-primary:disabled{opacity:0.45;cursor:not-allowed;transform:none;}

/* Admin panel */
.admin-actions {
  margin-top:14px;padding-top:14px;
  border-top:1px solid var(--ivory-dark);
  display:none; /* JS sets to flex */
  gap:8px;flex-wrap:wrap;
}
.admin-actions button {
  background:transparent;
  border:1px solid var(--gold-mid);
  color:var(--mahog-mid);
  padding:7px 16px;
  border-radius:var(--r-pill);
  font-weight:500;font-size:0.77rem;
  cursor:pointer;font-family:inherit;
  display:flex;align-items:center;gap:6px;
  transition:all var(--ease);
}
.admin-actions button:hover{background:var(--gold-lt);border-color:var(--gold);color:var(--mahog);}
.admin-actions .exit-admin{border-color:var(--parch);color:var(--mahog-faint);}
.admin-actions .exit-admin:hover{background:var(--linen);color:var(--mahog-lt);}

/* FIX: admin badge — single display value, toggle via JS */
.admin-badge-bar {
  display:none; /* toggled to flex by JS */
  align-items:center;gap:7px;
  margin-top:10px;
  font-size:0.71rem;color:var(--gold);font-weight:500;
  letter-spacing:0.04em;
}

/* ─── TABS ─── */
.tab-nav {
  display:flex;gap:0;
  margin-bottom:18px;
  background:var(--white);
  border-radius:var(--r-lg);
  padding:5px;
  box-shadow:var(--sh-xs);
  border:1px solid var(--ivory-dark);
}
.tab-btn {
  flex:1;
  padding:11px 14px;
  border:none;background:transparent;
  border-radius:var(--r-md);
  font-size:0.87rem;font-weight:500;
  cursor:pointer;color:var(--mahog-faint);
  font-family:inherit;
  transition:all var(--ease);
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.tab-btn:hover:not(.active){background:var(--linen);color:var(--mahog-lt);}
.tab-btn.active{background:var(--forest);color:white;box-shadow:0 2px 10px var(--forest-glow);}

.tab-content{display:none;}
.tab-content.active{display:block;animation:fadeUp 0.18s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ─── WHITEBOARD ─── */
.whiteboard {
  background:var(--linen);
  border-radius:var(--r-xl);
  padding:24px 22px;
  box-shadow:var(--sh-md);
  border:1px solid var(--parch);
}
.whiteboard-header {
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:20px;padding-bottom:16px;
  border-bottom:1px solid var(--parch);
}
.whiteboard-header h2 {
  color:var(--mahog);
  font-family:'Playfair Display',serif;
  font-size:1.15rem;
  font-weight:700;
  display:flex;align-items:center;gap:10px;
}
.wb-badge {
  background:var(--gold-faint);
  color:var(--gold);
  padding:4px 12px;
  border-radius:var(--r-pill);
  font-size:0.67rem;font-weight:500;
  letter-spacing:0.05em;
  border:1px solid var(--gold-mid);
}

/* Compose */
.compose-area {
  background:white;
  border-radius:var(--r-lg);
  padding:16px;
  margin-bottom:24px;
  border:1px solid var(--parch);
  box-shadow:var(--sh-xs);
}
.compose-area textarea {
  width:100%;
  padding:13px 16px;
  border:1.5px solid var(--ivory-dark);
  border-radius:var(--r-md);
  font-size:0.91rem;font-family:inherit;font-weight:300;
  background:var(--linen);color:var(--ink);
  resize:vertical;min-height:90px;
  line-height:1.65;
  transition:border-color var(--ease),background var(--ease);
}
.compose-area textarea:focus{outline:none;border-color:var(--forest);background:white;}
.compose-area textarea::placeholder{color:var(--mahog-faint);}
.compose-footer{display:flex;justify-content:flex-end;margin-top:12px;}

/* ─── STICKY NOTES — FIX spacing ─── */
.sticky-grid {
  display:flex;
  flex-direction:column;
  gap:16px; /* explicit gap, no margin collapsing issues */
}

.sticky-note {
  background:white;
  padding:18px 20px;
  border-radius:var(--r-lg);
  border-left:3px solid var(--forest-lt);
  box-shadow:var(--sh-sm);
  transition:transform var(--ease),box-shadow var(--ease);
  position:relative;
  /* REMOVED overflow:hidden — was clipping shadows & causing gap weirdness */
}
/* Decorative corner accent without overflow:hidden */
.sticky-note::after {
  content:'';
  position:absolute;
  top:0;right:0;
  width:50px;height:50px;
  background:radial-gradient(circle at top right, var(--gold-faint) 0%, transparent 72%);
  border-radius:0 var(--r-lg) 0 0;
  pointer-events:none;
}
.sticky-note:hover{transform:translateY(-2px);box-shadow:var(--sh-md);}
.sticky-note:nth-child(3n+1){border-left-color:var(--forest-lt);}
.sticky-note:nth-child(3n+2){border-left-color:var(--gold);}
.sticky-note:nth-child(3n+3){border-left-color:var(--mahog-lt);}

.sticky-header {
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px;
}
.sticky-author {
  background:var(--linen);
  padding:3px 12px;
  border-radius:var(--r-pill);
  font-size:0.71rem;font-weight:500;
  color:var(--forest);
  border:1px solid var(--parch);
  display:flex;align-items:center;gap:6px;
}
.sticky-time{font-size:0.62rem;color:var(--mahog-faint);}
.sticky-content {
  font-size:0.9rem;line-height:1.68;
  color:var(--ink-mid);
  word-break:break-word;
  margin-bottom:12px;
}
.sticky-footer {
  display:flex;justify-content:space-between;align-items:center;
}

.action-btn {
  background:none;border:none;cursor:pointer;
  padding:5px 12px;border-radius:var(--r-pill);
  font-size:0.71rem;font-family:inherit;
  display:inline-flex;align-items:center;gap:6px;
  transition:background var(--ease),color var(--ease);
}
.action-btn.reply{color:var(--forest);}
.action-btn.reply:hover{background:var(--linen);}
.action-btn.delete{color:var(--mahog-faint);}
.action-btn.delete:hover{background:#fef4f4;color:var(--ruby);}

/* Replies */
.replies-section{margin-top:12px;padding-top:10px;border-top:1px solid var(--ivory-dark);}
.reply-item{padding:8px 0;border-bottom:1px solid var(--ivory-dark);font-size:0.78rem;color:var(--ink-mid);}
.reply-item:last-child{border-bottom:none;}
.reply-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.reply-author{font-weight:500;color:var(--forest);font-size:0.71rem;}
.reply-time{font-size:0.6rem;color:var(--mahog-faint);}
.reply-content{word-break:break-word;line-height:1.5;}
.reply-input-area{margin-top:10px;display:none;gap:8px;align-items:center;}
.reply-input-area input{flex:1;padding:8px 14px;border-radius:var(--r-pill);border:1.5px solid var(--parch);font-size:0.8rem;font-family:inherit;background:var(--linen);transition:border-color var(--ease);}
.reply-input-area input:focus{outline:none;border-color:var(--forest);background:white;}
.reply-input-area button{background:var(--forest);border:none;color:white;padding:8px 18px;border-radius:var(--r-pill);font-size:0.75rem;cursor:pointer;font-family:inherit;font-weight:500;white-space:nowrap;transition:background var(--ease);}
.reply-input-area button:hover{background:var(--forest-mid);}

/* Load more */
.pagination-container{text-align:center;margin-top:20px;}
.load-more-btn{background:white;color:var(--mahog-lt);border:1.5px solid var(--parch);padding:10px 32px;border-radius:var(--r-pill);font-size:0.82rem;cursor:pointer;font-family:inherit;font-weight:400;transition:all var(--ease);}
.load-more-btn:hover{background:var(--linen);border-color:var(--forest);color:var(--forest);}
.load-more-btn:disabled{opacity:0.4;cursor:not-allowed;}

.empty-sticky{text-align:center;color:var(--mahog-faint);padding:52px 20px;font-size:0.88rem;line-height:1.8;}

/* ─── PRIVATE MESSAGES ─── */
.private-layout{display:flex;gap:16px;min-height:620px;}
@media(max-width:660px){
  .private-layout{flex-direction:column;min-height:unset;}
  .contact-list{width:100%!important;max-height:240px;}
  .chat-area{min-height:520px;}
}

.contact-list {
  width:280px;flex-shrink:0;
  background:white;
  border-radius:var(--r-xl);
  overflow:hidden;
  box-shadow:var(--sh-sm);
  border:1px solid var(--ivory-dark);
  display:flex;flex-direction:column;
}
.contact-header {
  background:var(--forest);
  color:white;
  padding:16px 18px;
  font-weight:500;font-size:0.87rem;
  display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;
}
.new-chat-btn {
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.25);
  color:white;
  padding:7px 14px;border-radius:var(--r-pill);
  cursor:pointer;font-size:0.77rem;font-family:inherit;font-weight:500;
  display:flex;align-items:center;gap:6px;
  transition:background var(--ease);
}
.new-chat-btn:hover{background:rgba(255,255,255,0.25);}

.contact-items{flex:1;overflow-y:auto;}
.contact-item {
  display:flex;align-items:center;gap:12px;
  padding:13px 16px;
  border-bottom:1px solid var(--ivory-dark);
  cursor:pointer;
  transition:background var(--ease);
}
.contact-item:hover{background:var(--linen);}
.contact-item.active{background:linear-gradient(90deg,rgba(45,74,39,0.07),transparent);border-left:3px solid var(--forest);}
.contact-avatar {
  width:42px;height:42px;
  background:linear-gradient(135deg,var(--parch),var(--ivory-dark));
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;color:var(--forest);
  font-size:1rem;flex-shrink:0;
  border:2px solid var(--gold-lt);
  font-family:'Playfair Display',serif;
}
.contact-info{flex:1;min-width:0;}
.contact-name{font-weight:500;color:var(--ink);font-size:0.87rem;}
.contact-preview{font-size:0.67rem;color:var(--mahog-lt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.contact-dot{width:7px;height:7px;border-radius:50%;background:var(--forest-lt);flex-shrink:0;opacity:0.45;}
.empty-contact{text-align:center;color:var(--mahog-faint);padding:36px 16px;font-size:0.83rem;line-height:1.9;}

.chat-area {
  flex:1;background:white;
  border-radius:var(--r-xl);
  overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:var(--sh-sm);
  border:1px solid var(--ivory-dark);
  min-width:0;
}
.chat-header {
  background:var(--linen);
  padding:14px 20px;
  border-bottom:1px solid var(--parch);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.ch-avatar {
  width:40px;height:40px;
  background:linear-gradient(135deg,var(--parch),var(--ivory-dark));
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;color:var(--forest);flex-shrink:0;
  border:2px solid var(--gold-lt);
  font-family:'Playfair Display',serif;
}
.chat-header h3{color:var(--ink);flex:1;font-size:0.95rem;font-weight:500;}
.chat-status{font-size:0.64rem;color:var(--mahog-faint);display:block;margin-top:2px;}

.delete-user-btn{
  background:var(--ruby);border:none;color:white;
  padding:7px 14px;border-radius:var(--r-pill);
  font-size:0.72rem;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;gap:6px;
  transition:background var(--ease);
}
.delete-user-btn:hover{background:var(--mahog);}

.chat-messages {
  flex:1;padding:22px 18px;overflow-y:auto;
  display:flex;flex-direction:column;gap:14px;
  background:linear-gradient(180deg,var(--ivory) 0%,white 60%);
}
.empty-chat{text-align:center;color:var(--mahog-faint);padding:52px 20px;font-size:0.87rem;line-height:1.85;}

.chat-bubble{display:flex;flex-direction:column;max-width:76%;}
.bubble-sent{align-self:flex-end;}
.bubble-received{align-self:flex-start;}

.bubble-content{
  padding:11px 16px;border-radius:18px;
  font-size:0.88rem;line-height:1.55;word-break:break-word;
}
.bubble-sent .bubble-content{
  background:var(--forest);color:white;
  border-bottom-right-radius:4px;
  box-shadow:0 2px 8px var(--forest-glow);
}
.bubble-received .bubble-content{
  background:white;color:var(--ink-mid);
  border:1px solid var(--parch);
  border-bottom-left-radius:4px;
  box-shadow:var(--sh-xs);
}
.bubble-anon .bubble-content{
  background:linear-gradient(135deg,#5c4fa0,#3d3580);
  color:white;border-bottom-right-radius:4px;
}
.bubble-info{
  font-size:0.6rem;color:var(--mahog-faint);
  margin:4px 10px 0;
  display:flex;gap:8px;align-items:center;
}
.bubble-sent .bubble-info{justify-content:flex-end;}
.bubble-received .bubble-info{justify-content:flex-start;}
.anon-tag{background:rgba(92,79,160,0.12);color:#5c4fa0;padding:2px 7px;border-radius:var(--r-pill);font-size:0.59rem;font-weight:500;}
.del-msg-btn{background:none;border:none;color:var(--parch);cursor:pointer;font-size:0.62rem;padding:0;transition:color var(--ease);}
.del-msg-btn:hover{color:var(--ruby);}

.chat-input-area{
  padding:14px 18px;background:white;
  border-top:1px solid var(--parch);
  display:flex;flex-direction:column;gap:10px;flex-shrink:0;
}
.anon-toggle-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;
  background:var(--linen);border-radius:var(--r-md);border:1px solid var(--parch);
}
.anon-toggle{
  appearance:none;-webkit-appearance:none;
  width:38px;height:21px;

<script>
const SUPABASE_URL="https://chfanuzhklzzawbcazjp.supabase.co";
const SUPABASE_ANON="sb_publishable_7yvNBNHbSe-2cPbQ-yiXpA_z6dr1DYf";
const ADMIN_PWD="reset2024";
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
let currentUser="",isAdmin=false,currentContact=null;
const PAGE_SIZE=10;let isLoadingMore=false;

function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function fmt(ts){const d=new Date(+ts);return`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}

function showMsg(msg){
  const m=document.getElementById('successModal');
  document.getElementById('successMessage').textContent=msg;
  m.style.display='flex';
  document.getElementById('closeSuccessModal').onclick=()=>m.style.display='none';
  m.querySelector('.modal-overlay').onclick=e=>{if(e.target===m.querySelector('.modal-overlay'))m.style.display='none';};
}
function showConfirm(msg,cb){
  const m=document.getElementById('confirmModal');
  document.getElementById('confirmMessage').textContent=msg;
  m.style.display='flex';
  document.getElementById('confirmYes').onclick=()=>{m.style.display='none';cb&&cb();};
  document.getElementById('confirmNo').onclick=()=>m.style.display='none';
  m.querySelector('.modal-overlay').onclick=e=>{if(e.target===m.querySelector('.modal-overlay'))m.style.display='none';};
}
async function getAllUsers(){
  const{data}=await sb.from('users').select('username');
  return(data||[]).map(u=>u.username).filter(u=>u!==currentUser);
}

// ── PUBLIC BOARD ──
async function loadPublic(page=1,append=false){
  const from=(page-1)*PAGE_SIZE,to=from+PAGE_SIZE-1;
  try{
    const{data:messages,error,count}=await sb.from('public_messages').select('*',{count:'exact'}).order('timestamp',{ascending:false}).range(from,to);
    if(error)throw error;
    const{data:allReplies}=await sb.from('public_message_replies').select('*');
    const byMsg={};(allReplies||[]).forEach(r=>{(byMsg[r.message_id]=byMsg[r.message_id]||[]).push(r);});
    const container=document.getElementById('publicList');
    if(!append)container.innerHTML='';
    if(!messages.length&&page===1){
      container.innerHTML='<div class="empty-sticky"><svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="var(--parch)" stroke-width="1.2" style="margin-bottom:12px;display:block;margin-left:auto;margin-right:auto;"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>还没有便利贴，写第一张吧！</div>';
      document.getElementById('paginationControls').innerHTML='';return;
    }
    const frag=document.createDocumentFragment();
    for(const msg of messages){
      const canDel=currentUser===msg.username||isAdmin;
      const replies=byMsg[msg.id]||[];
      const repliesHtml=replies.map(r=>`
        <div class="reply-item">
          <div class="reply-header">
            <span class="reply-author">${esc(r.username)}</span>
            <span class="reply-time">${fmt(r.timestamp)}</span>
          </div>
          <div class="reply-content">${esc(r.content)}</div>
          ${(currentUser===r.username||isAdmin)?`<button class="action-btn delete" onclick="deleteReply('${r.id}')" style="margin-top:4px;font-size:0.65rem;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>删除</button>`:''}
        </div>`).join('');
      const div=document.createElement('div');
      div.className='sticky-note';div.dataset.id=msg.id;
      div.innerHTML=`
        <div class="sticky-header">
          <span class="sticky-author">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M20 14.66V20a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5.34"/><polygon points="18 2 22 6 12 16 8 16 8 12 18 2"/></svg>
            ${esc(msg.username)}
          </span>
          <span class="sticky-time">${fmt(msg.timestamp)}</span>
        </div>
        <div class="sticky-content">${esc(msg.content)}</div>
        <div class="sticky-footer">
          <button class="action-btn reply" onclick="toggleReply(${msg.id})">
            <span class="icon-reply"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg></span>
            回复${replies.length?` (${replies.length})`:''}</button>
          ${canDel?`<button class="action-btn delete" onclick="deletePublic('${msg.id}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>撕掉</button>`:''}
        </div>
        <div class="replies-section" id="replies-${msg.id}">
          <div class="replies-list">${repliesHtml}</div>
          <div class="reply-input-area" id="reply-input-${msg.id}">
            <input type="text" id="reply-content-${msg.id}" placeholder="写评论…">
            <button onclick="submitReply(${msg.id})">发送</button>
          </div>
        </div>`;
      frag.appendChild(div);
    }
    container.appendChild(frag);
    const pages=Math.ceil(count/PAGE_SIZE);
    const ctrl=document.getElementById('paginationControls');
    if(pages>1&&page<pages){
      ctrl.innerHTML=`<button class="load-more-btn" id="loadMoreBtn">加载更多 (${page}/${pages})</button>`;
      document.getElementById('loadMoreBtn').onclick=()=>{if(isLoadingMore)return;isLoadingMore=true;loadPublic(page+1,true).finally(()=>isLoadingMore=false);};
    }else ctrl.innerHTML='';
  }catch(e){console.error(e);showMsg('加载失败，请检查网络');}
}
async function refreshPublic(){await loadPublic(1,false);}

window.toggleReply=id=>{
  const el=document.getElementById(`reply-input-${id}`);
  if(el)el.style.display=el.style.display==='flex'?'none':'flex';
};
window.submitReply=async id=>{
  if(!currentUser){showMsg('请先设置昵称');return;}
  const input=document.getElementById(`reply-content-${id}`);
  const content=(input.value||'').trim();
  if(!content){showMsg('请输入评论内容');return;}
  const{error}=await sb.from('public_message_replies').insert({message_id:id,username:currentUser,content,timestamp:Date.now()});
  if(error){showMsg('评论失败: '+error.message);return;}
  input.value='';await refreshPublic();
};
window.deleteReply=async id=>{
  showConfirm('确定删除这条评论？',async()=>{
    const{error}=await sb.from('public_message_replies').delete().eq('id',id);
    if(!error)await refreshPublic();else showMsg('删除失败');
  });
};
window.deletePublic=async id=>{
  showConfirm('确定撕掉这张便利贴？',async()=>{
    const{error}=await sb.from('public_messages').delete().eq('id',id);
    if(!error){await refreshPublic();showMsg('便利贴已撕掉！');}else showMsg('删除失败');
  });
};
async function postPublic(){
  if(!currentUser){showMsg('请先设置昵称');return;}
  const content=document.getElementById('publicContent').value.trim();
  if(!content){showMsg('请输入内容');return;}
  const{error}=await sb.from('public_messages').insert({username:currentUser,content,timestamp:Date.now()});
  if(!error){document.getElementById('publicContent').value='';await refreshPublic();showMsg('便利贴贴上啦！');}
  else showMsg('发布失败，请稍后重试');
}

// ── CONTACTS / CHAT ──
async function loadContacts(){
  if(!currentUser){document.getElementById('contactList').innerHTML='<div class="empty-contact">请先设置昵称<br>再开始私信</div>';return;}
  const{data,error}=await sb.from('private_messages').select('fromUser,toUser,timestamp').or(`fromUser.eq.${currentUser},toUser.eq.${currentUser}`).order('timestamp',{ascending:false});
  if(error)return;
  const seen=new Set(),contacts=[];
  for(const m of(data||[])){const other=m.fromUser===currentUser?m.toUser:m.fromUser;if(!seen.has(other)){seen.add(other);contacts.push(other);}}
  const container=document.getElementById('contactList');
  if(!contacts.length){container.innerHTML='<div class="empty-contact">💬 暂无联系人<br>点击「新聊天」开始对话</div>';return;}
  const{data:lastMsgs}=await sb.from('private_messages').select('fromUser,toUser,content').or(`fromUser.eq.${currentUser},toUser.eq.${currentUser}`).order('timestamp',{ascending:false});
  const lastBy={};for(const m of(lastMsgs||[])){const other=m.fromUser===currentUser?m.toUser:m.fromUser;if(!lastBy[other])lastBy[other]=m.content;}
  container.innerHTML=contacts.map(c=>`
    <div class="contact-item${currentContact===c?' active':''}" onclick="selectContact('${esc(c)}')">
      <div class="contact-avatar">${esc(c.charAt(0).toUpperCase())}</div>
      <div class="contact-info">
        <div class="contact-name">${esc(c)}</div>
        <div class="contact-preview">${esc((lastBy[c]||'').slice(0,30))}</div>
      </div>
      <div class="contact-dot"></div>
    </div>`).join('');
}

async function getMessagesWith(user){
  const{data,error}=await sb.from('private_messages').select('*').or(`and(fromUser.eq.${currentUser},toUser.eq.${user}),and(fromUser.eq.${user},toUser.eq.${currentUser})`).order('timestamp',{ascending:true});
  return error?[]:data;
}

window.selectContact=async contact=>{
  if(!currentUser)return;
  currentContact=contact;
  const msgs=await getMessagesWith(contact);
  const container=document.getElementById('chatMessages');
  if(!msgs.length){
    container.innerHTML='<div class="empty-chat"><svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="var(--parch)" stroke-width="1.2" stroke-linecap="round" style="margin-bottom:12px;display:block;margin-left:auto;margin-right:auto;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>留下你想对TA说的悄悄话吧～</div>';
  }else{
    container.innerHTML=msgs.map(m=>{
      const isSender=m.fromUser===currentUser;
      const isAnon=!!m.isAnon;
      let cls='chat-bubble '+(isSender?'bubble-sent':'bubble-received');
      if(isSender&&isAnon)cls+=' bubble-anon';
      const anonTag=isSender&&isAnon?'<span class="anon-tag">匿名发出</span> ':'';
      const displayName=(!isSender&&isAnon)?'匿名':(isSender?currentUser:m.fromUser);
      const canDel=isSender||isAdmin;
      return`<div class="${cls}"><div class="bubble-content">${esc(m.content)}</div><div class="bubble-info">${anonTag}<span>${displayName} · ${fmt(m.timestamp)}</span>${canDel?`<button class="del-msg-btn" data-id="${m.id}">删除</button>`:''}</div></div>`;
    }).join('');
    container.scrollTop=container.scrollHeight;
    container.querySelectorAll('.del-msg-btn').forEach(btn=>{btn.onclick=()=>deletePrivateMsg(btn.dataset.id);});
  }
  document.getElementById('chatHeader').style.display='flex';
  document.getElementById('chatInputArea').style.display='flex';
  document.getElementById('chatAvatar').textContent=contact.charAt(0).toUpperCase();
  document.getElementById('chatWithName').textContent=contact;
  document.getElementById('deleteUserBtn').style.display=(isAdmin&&contact!==currentUser)?'flex':'none';
  document.querySelectorAll('.contact-item').forEach(el=>{el.classList.toggle('active',el.querySelector('.contact-name')?.textContent===contact);});
  document.getElementById('chatMessageInput').focus();
};

async function deletePrivateMsg(id){
  showConfirm('确定删除这条消息？',async()=>{
    const{error}=await sb.from('private_messages').delete().eq('id',id);
    if(!error){if(currentContact)await window.selectContact(currentContact);await loadContacts();}
    else showMsg('删除失败');
  });
}

window.sendToCurrent=async()=>{
  if(!currentUser||!currentContact)return;
  const input=document.getElementById('chatMessageInput');
  const content=input.value.trim();if(!content)return;
  const isAnon=document.getElementById('anonToggle').checked;
  input.value='';
  const{error}=await sb.from('private_messages').insert({fromUser:currentUser,toUser:currentContact,content,isAnon,timestamp:Date.now()});
  if(!error){await loadContacts();await window.selectContact(currentContact);}
  else{showMsg('发送失败，请稍后重试');input.value=content;}
};

// ── USER MANAGEMENT ──
function applyUserUI(){
  document.getElementById('userBadgeText').textContent=currentUser;
  document.getElementById('nicknameInput').disabled=true;
  document.getElementById('setNameBtn').disabled=true;
  document.getElementById('nicknameInput').value=currentUser;
}

async function setUserName(){
  const newName=document.getElementById('nicknameInput').value.trim();
  if(!newName){showMsg('请输入昵称');return;}
  const{data:ex}=await sb.from('users').select('username').eq('username',newName).maybeSingle();
  if(ex){showMsg('该昵称已被使用，请换一个');return;}
  const{error}=await sb.from('users').insert({username:newName});
  if(error){showMsg('设置失败：'+error.message);return;}
  currentUser=newName;localStorage.setItem('wall_user_saved',currentUser);
  applyUserUI();await loadContacts();await refreshPublic();
  showMsg(`昵称「${currentUser}」设置成功！`);
}

async function adminChangeName(){
  if(!isAdmin)return;
  const oldName=prompt('输入要修改的用户昵称：');if(!oldName)return;
  const newName=prompt('输入新昵称：');if(!newName)return;
  const{error}=await sb.rpc('admin_rename_user',{old_name:oldName,new_name:newName});
  if(error){showMsg('改名失败：'+error.message);return;}
  showMsg(`"${oldName}" 已改名为 "${newName}"`);
  if(currentUser===oldName){currentUser=newName;localStorage.setItem('wall_user_saved',currentUser);applyUserUI();}
  await refreshPublic();await loadContacts();if(currentContact)await window.selectContact(currentContact);
}

async function adminDeleteUser(username){
  if(!isAdmin||username===currentUser){showMsg('不能删除自己');return;}
  showConfirm(`确定删除用户「${username}」及其所有数据？`,async()=>{
    const{error}=await sb.rpc('admin_delete_user',{target_name:username});
    if(error){showMsg('删除失败：'+error.message);return;}
    showMsg(`用户「${username}」已删除`);
    if(currentContact===username){
      currentContact=null;
      document.getElementById('chatHeader').style.display='none';
      document.getElementById('chatInputArea').style.display='none';
      document.getElementById('chatMessages').innerHTML='<div class="empty-chat">留下你想对TA说的悄悄话吧～</div>';
    }
    await refreshPublic();await loadContacts();
    document.getElementById('userListModal').style.display='none';
  });
}
window.adminDeleteUserFromList=adminDeleteUser;

async function openUserListModal(){
  if(!isAdmin)return;
  const users=await getAllUsers();
  const render=list=>{
    document.getElementById('allUsersList').innerHTML=list.length
      ?list.map(u=>`<div class="user-item"><span>${esc(u)}</span><button class="user-delete-btn" onclick="adminDeleteUserFromList('${esc(u)}')">删除</button></div>`).join('')
      :'<div style="padding:24px;text-align:center;color:var(--mahog-faint);">暂无用户</div>';
  };
  render(users);
  document.getElementById('userListModal').style.display='flex';
  const si=document.getElementById('searchUserListInput');
  si.value='';
  si.oninput=e=>render(users.filter(u=>u.toLowerCase().includes(e.target.value.toLowerCase())));
}

async function openSearchModal(){
  if(!currentUser){showMsg('请先设置昵称');return;}
  const users=await getAllUsers();
  const render=list=>{
    document.getElementById('searchResults').innerHTML=list.length
      ?list.map(u=>`<div class="user-item"><span>${esc(u)}</span><button class="user-select-btn" onclick="startChatWith('${esc(u)}')">发消息</button></div>`).join('')
      :'<div style="padding:24px;text-align:center;color:var(--mahog-faint);">没有找到用户</div>';
  };
  const si=document.getElementById('searchUserInput');
  si.value='';render(users);
  si.oninput=e=>render(users.filter(u=>u.toLowerCase().includes(e.target.value.toLowerCase())));
  document.getElementById('searchUserModal').style.display='flex';
  setTimeout(()=>si.focus(),80);
}

window.startChatWith=async user=>{
  if(user===currentUser){showMsg('不能和自己聊天');return;}
  document.getElementById('searchUserModal').style.display='none';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-tab="tab2"]').classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab2').classList.add('active');
  await loadContacts();await window.selectContact(user);
};

// ── ADMIN AUTH ──
function openAdminLogin(){
  document.getElementById('adminLoginModal').style.display='flex';
  document.getElementById('adminPasswordInput').value='';
}

function verifyAdmin(){
  if(document.getElementById('adminPasswordInput').value===ADMIN_PWD){
    isAdmin=true;
    // FIX: use single display value via style.display
    document.getElementById('adminBadge').style.display='flex';
    document.getElementById('adminActions').style.display='flex';
    document.getElementById('adminLoginModal').style.display='none';
    showMsg('管理员模式已启用');
    refreshPublic();
    if(currentContact)window.selectContact(currentContact);
  }else showMsg('密码错误');
}

function exitAdmin(){
  isAdmin=false;
  document.getElementById('adminBadge').style.display='none';
  document.getElementById('adminActions').style.display='none';
  document.getElementById('deleteUserBtn').style.display='none';
  showMsg('已退出管理员模式');
  refreshPublic();
  if(currentContact)window.selectContact(currentContact);
}

// ── EVENT LISTENERS ──
document.getElementById('setNameBtn').onclick=setUserName;
document.getElementById('postPublicBtn').onclick=postPublic;
document.getElementById('sendChatBtn').onclick=window.sendToCurrent;
document.getElementById('newChatBtn').onclick=openSearchModal;
document.getElementById('closeSearchModal').onclick=()=>document.getElementById('searchUserModal').style.display='none';
document.getElementById('closeUserListBtn').onclick=()=>document.getElementById('userListModal').style.display='none';
document.getElementById('adminLoginBtn').onclick=()=>{document.getElementById('userDropdown').classList.remove('show');openAdminLogin();};
document.getElementById('confirmAdminLogin').onclick=verifyAdmin;
document.getElementById('cancelAdminLogin').onclick=()=>document.getElementById('adminLoginModal').style.display='none';
document.getElementById('exitAdminBtn').onclick=exitAdmin;
document.getElementById('resetNameBtn').onclick=adminChangeName;
document.getElementById('showUsersBtn').onclick=openUserListModal;
document.getElementById('deleteUserBtn').onclick=()=>{if(currentContact)adminDeleteUser(currentContact);};

document.getElementById('chatMessageInput').addEventListener('keypress',e=>{if(e.key==='Enter')window.sendToCurrent();});
document.getElementById('nicknameInput').addEventListener('keypress',e=>{if(e.key==='Enter')setUserName();});
document.getElementById('adminPasswordInput').addEventListener('keypress',e=>{if(e.key==='Enter')verifyAdmin();});

document.getElementById('userMenu').addEventListener('click',e=>{
  e.stopPropagation();
  document.getElementById('userDropdown').classList.toggle('show');
});
document.addEventListener('click',()=>document.getElementById('userDropdown').classList.remove('show'));

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    document.getElementById(btn.dataset.tab).classList.add('active');
    if(btn.dataset.tab==='tab2'&&currentUser)loadContacts();
  });
});

// ── INIT ──
(async()=>{
  const saved=localStorage.getItem('wall_user_saved');
  if(saved){
    const{data}=await sb.from('users').select('username').eq('username',saved).maybeSingle();
    if(data){currentUser=saved;applyUserUI();}else localStorage.removeItem('wall_user_saved');
  }
  await refreshPublic();
  if(currentUser)await loadContacts();

  sb.channel('public-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'public_messages'},refreshPublic)
    .on('postgres_changes',{event:'*',schema:'public',table:'public_message_replies'},refreshPublic)
    .subscribe();

  sb.channel('private-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'private_messages'},async()=>{
      if(currentUser){await loadContacts();if(currentContact)await window.selectContact(currentContact);}
    }).subscribe();
})();
</script>
